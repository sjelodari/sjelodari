    </linearGradient>
    <linearGradient id="how" x1="312" y1="0" x2="452" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9aa8bd" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7aa2ff"/>
