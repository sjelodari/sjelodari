name: Update profile

on:
  schedule:
    - cron: "17 4 * * *"   # daily — keeps Uptime.GitHub current
  workflow_dispatch:
  push:
    branches: [main]
    paths: [generate_profile.py]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate profile.svg
        run: python generate_profile.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile.svg"
          git push
